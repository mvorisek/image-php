name: CI

on:
  pull_request:
  push:
  schedule:
    - cron: '20 2 1,15 * *'

jobs:
  unit:
    name: Templating
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/mvorisek/image-php
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: "Check if files are in-sync"
        run: |
          rm -rf data/
          php make.php
          git add . -N && git diff --exit-code

  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      REGISTRY_NAME: ghcr.io
      REGISTRY_IMAGE_NAME: ghcr.io/${{ github.repository }}
    strategy:
      fail-fast: false
      matrix:
        imageName:
          - "7.2-alpine"
          - "7.2-zts-alpine"
          - "7.2-debug-alpine"
          - "7.2dev-alpine"
          - "7.2dev-zts-alpine"
          - "7.2dev-debug-alpine"
          - "7.3-alpine"
          - "7.3-zts-alpine"
          - "7.3-debug-alpine"
          - "7.3dev-alpine"
          - "7.3dev-zts-alpine"
          - "7.3dev-debug-alpine"
          - "7.4-alpine"
          - "7.4-zts-alpine"
          - "7.4-debug-alpine"
          - "7.4dev-alpine"
          - "7.4dev-zts-alpine"
          - "7.4dev-debug-alpine"
          - "8.0-alpine"
          - "8.0-zts-alpine"
          - "8.0-debug-alpine"
          - "8.0dev-alpine"
          - "8.0dev-zts-alpine"
          - "8.0dev-debug-alpine"
          - "8.1-alpine"
          - "8.1-zts-alpine"
          - "8.1-debug-alpine"
          - "8.1dev-alpine"
          - "8.1dev-zts-alpine"
          - "8.1dev-debug-alpine"
          - "8.2dev-alpine"
          - "8.2dev-zts-alpine"
          - "8.2dev-debug-alpine"
          - "7.2-debian"
          - "7.2-zts-debian"
          - "7.2-debug-debian"
          - "7.2dev-debian"
          - "7.2dev-zts-debian"
          - "7.2dev-debug-debian"
          - "7.3-debian"
          - "7.3-zts-debian"
          - "7.3-debug-debian"
          - "7.3dev-debian"
          - "7.3dev-zts-debian"
          - "7.3dev-debug-debian"
          - "7.4-debian"
          - "7.4-zts-debian"
          - "7.4-debug-debian"
          - "7.4dev-debian"
          - "7.4dev-zts-debian"
          - "7.4dev-debug-debian"
          - "8.0-debian"
          - "8.0-zts-debian"
          - "8.0-debug-debian"
          - "8.0dev-debian"
          - "8.0dev-zts-debian"
          - "8.0dev-debug-debian"
          - "8.1-debian"
          - "8.1-zts-debian"
          - "8.1-debug-debian"
          - "8.1dev-debian"
          - "8.1dev-zts-debian"
          - "8.1dev-debug-debian"
          - "8.2dev-debian"
          - "8.2dev-zts-debian"
          - "8.2dev-debug-debian"
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: 'Build base image - clone & patch - 7.x'
        if: (matrix.imageName == '7.2-alpine' || matrix.imageName == '7.2-zts-alpine' || matrix.imageName == '7.2-debug-alpine' || matrix.imageName == '7.3-alpine' || matrix.imageName == '7.3-zts-alpine' || matrix.imageName == '7.3-debug-alpine' || matrix.imageName == '7.4-alpine' || matrix.imageName == '7.4-zts-alpine' || matrix.imageName == '7.4-debug-alpine' || matrix.imageName == '7.2-debian' || matrix.imageName == '7.2-zts-debian' || matrix.imageName == '7.2-debug-debian' || matrix.imageName == '7.3-debian' || matrix.imageName == '7.3-zts-debian' || matrix.imageName == '7.3-debug-debian' || matrix.imageName == '7.4-debian' || matrix.imageName == '7.4-zts-debian' || matrix.imageName == '7.4-debug-debian')
        run: >-
          if [ "${{ matrix.imageName }}" == "7.2-alpine" ] || [ "${{ matrix.imageName }}" == "7.2-zts-alpine" ] || [ "${{ matrix.imageName }}" == "7.2-debug-alpine" ] || [ "${{ matrix.imageName }}" == "7.2-debian" ] || [ "${{ matrix.imageName }}" == "7.2-zts-debian" ] || [ "${{ matrix.imageName }}" == "7.2-debug-debian" ]; then
          export PHPSRC_BRANCH="$(git ls-remote 'https://github.com/php/php-src.git' | grep -iE '\srefs/tags/PHP-7\.2\.[0-9]+$' | sort -k2 -V | tee /dev/stderr | awk 'END{print $NF}' | sed -E 's~^refs/[^/]+/~~')"
          ; elif [ "${{ matrix.imageName }}" == "7.3-alpine" ] || [ "${{ matrix.imageName }}" == "7.3-zts-alpine" ] || [ "${{ matrix.imageName }}" == "7.3-debug-alpine" ] || [ "${{ matrix.imageName }}" == "7.3-debian" ] || [ "${{ matrix.imageName }}" == "7.3-zts-debian" ] || [ "${{ matrix.imageName }}" == "7.3-debug-debian" ]; then
          export PHPSRC_BRANCH="$(git ls-remote 'https://github.com/php/php-src.git' | grep -iE '\srefs/tags/PHP-7\.3\.[0-9]+$' | sort -k2 -V | tee /dev/stderr | awk 'END{print $NF}' | sed -E 's~^refs/[^/]+/~~')"
          ; elif [ "${{ matrix.imageName }}" == "7.4-alpine" ] || [ "${{ matrix.imageName }}" == "7.4-zts-alpine" ] || [ "${{ matrix.imageName }}" == "7.4-debug-alpine" ] || [ "${{ matrix.imageName }}" == "7.4-debian" ] || [ "${{ matrix.imageName }}" == "7.4-zts-debian" ] || [ "${{ matrix.imageName }}" == "7.4-debug-debian" ]; then
          export PHPSRC_BRANCH="$(git ls-remote 'https://github.com/php/php-src.git' | grep -iE '\srefs/tags/PHP-7\.4\.[0-9]+$' | sort -k2 -V | tee /dev/stderr | awk 'END{print $NF}' | sed -E 's~^refs/[^/]+/~~')"
          ; fi
          && if [ "${{ matrix.imageName }}" == "7.2-alpine" ] || [ "${{ matrix.imageName }}" == "7.2-zts-alpine" ] || [ "${{ matrix.imageName }}" == "7.2-debug-alpine" ] || [ "${{ matrix.imageName }}" == "7.3-alpine" ] || [ "${{ matrix.imageName }}" == "7.3-zts-alpine" ] || [ "${{ matrix.imageName }}" == "7.3-debug-alpine" ] || [ "${{ matrix.imageName }}" == "7.4-alpine" ] || [ "${{ matrix.imageName }}" == "7.4-zts-alpine" ] || [ "${{ matrix.imageName }}" == "7.4-debug-alpine" ] || [ "${{ matrix.imageName }}" == "7.2-debian" ] || [ "${{ matrix.imageName }}" == "7.2-zts-debian" ] || [ "${{ matrix.imageName }}" == "7.2-debug-debian" ] || [ "${{ matrix.imageName }}" == "7.3-debian" ] || [ "${{ matrix.imageName }}" == "7.3-zts-debian" ] || [ "${{ matrix.imageName }}" == "7.3-debug-debian" ] || [ "${{ matrix.imageName }}" == "7.4-debian" ] || [ "${{ matrix.imageName }}" == "7.4-zts-debian" ] || [ "${{ matrix.imageName }}" == "7.4-debug-debian" ]; then
          git clone --depth 1 'https://github.com/php/php-src.git' -b "$PHPSRC_BRANCH" phpsrc
          ; fi
          && cd phpsrc && export PHPSRC_COMMIT="$(git rev-parse HEAD)"
          && git checkout -B master
          && if [ "${{ matrix.imageName }}" == "7.2-alpine" ] || [ "${{ matrix.imageName }}" == "7.2-zts-alpine" ] || [ "${{ matrix.imageName }}" == "7.2-debug-alpine" ] || [ "${{ matrix.imageName }}" == "7.2-debian" ] || [ "${{ matrix.imageName }}" == "7.2-zts-debian" ] || [ "${{ matrix.imageName }}" == "7.2-debug-debian" ]; then
          sed -E 's~ --remote=\$PHPROOT ~ ~' -i makedist && git -c user.name="a" -c user.email="a@a" commit -am "Fix makedist for PHP 7.2"
          ; fi
          && if [ "${{ matrix.imageName }}" == "7.2-alpine" ] || [ "${{ matrix.imageName }}" == "7.2-zts-alpine" ] || [ "${{ matrix.imageName }}" == "7.2-debug-alpine" ]; then
          git apply -v ../fix-intl-php72-bug80310.patch && git -c user.name="a" -c user.email="a@a" commit -am "Fix intl ext build with ICU 68.1+ for PHP 7.2"
          ; fi
          && git apply -v ../fix-pdo_oci-bug60994.patch && git -c user.name="a" -c user.email="a@a" commit -am "Fix pdo_oci ext NCLOB read"
          && sudo apt-get -y update && sudo apt-get -y install bison re2c
          && if [ "${{ matrix.imageName }}" == "7.2-alpine" ] || [ "${{ matrix.imageName }}" == "7.2-zts-alpine" ] || [ "${{ matrix.imageName }}" == "7.2-debug-alpine" ] || [ "${{ matrix.imageName }}" == "7.3-alpine" ] || [ "${{ matrix.imageName }}" == "7.3-zts-alpine" ] || [ "${{ matrix.imageName }}" == "7.3-debug-alpine" ] || [ "${{ matrix.imageName }}" == "7.2-debian" ] || [ "${{ matrix.imageName }}" == "7.2-zts-debian" ] || [ "${{ matrix.imageName }}" == "7.2-debug-debian" ] || [ "${{ matrix.imageName }}" == "7.3-debian" ] || [ "${{ matrix.imageName }}" == "7.3-zts-debian" ] || [ "${{ matrix.imageName }}" == "7.3-debug-debian" ]; then
          git tag php-1.0 && ./makedist 1.0 > /dev/null && mv php-1.0.tar.xz php.tar.xz
          ; elif [ "${{ matrix.imageName }}" == "7.4-alpine" ] || [ "${{ matrix.imageName }}" == "7.4-zts-alpine" ] || [ "${{ matrix.imageName }}" == "7.4-debug-alpine" ] || [ "${{ matrix.imageName }}" == "7.4-debian" ] || [ "${{ matrix.imageName }}" == "7.4-zts-debian" ] || [ "${{ matrix.imageName }}" == "7.4-debug-debian" ]; then
          scripts/dev/makedist > /dev/null && mv php-master-*.tar.xz php.tar.xz
          ; fi
          && git add . -N && git diff --diff-filter=d "$PHPSRC_COMMIT"
          && cd ..
          && git clone https://github.com/docker-library/php.git dlphp && cd dlphp
          && rm -r [0-9].[0-9]*/ && sed -E 's~( // )error\("missing GPG keys for " \+ env\.version\)~\1["x"]~' -i Dockerfile-linux.template
          && if [ "${{ matrix.imageName }}" == "7.2-alpine" ] || [ "${{ matrix.imageName }}" == "7.2-debug-alpine" ]; then
          echo '{ "7.2": { "url": "x", "variants": [ "alpine3.15/cli" ], "version": "7.2.99" } }' > versions.json
          ; elif [ "${{ matrix.imageName }}" == "7.2-zts-alpine" ]; then
          echo '{ "7.2": { "url": "x", "variants": [ "alpine3.15/zts" ], "version": "7.2.99" } }' > versions.json
          ; elif [ "${{ matrix.imageName }}" == "7.3-alpine" ] || [ "${{ matrix.imageName }}" == "7.3-debug-alpine" ]; then
          echo '{ "7.3": { "url": "x", "variants": [ "alpine3.15/cli" ], "version": "7.3.99" } }' > versions.json
          ; elif [ "${{ matrix.imageName }}" == "7.3-zts-alpine" ]; then
          echo '{ "7.3": { "url": "x", "variants": [ "alpine3.15/zts" ], "version": "7.3.99" } }' > versions.json
          ; elif [ "${{ matrix.imageName }}" == "7.4-alpine" ] || [ "${{ matrix.imageName }}" == "7.4-debug-alpine" ]; then
          echo '{ "7.4": { "url": "x", "variants": [ "alpine3.15/cli" ], "version": "7.4.99" } }' > versions.json
          ; elif [ "${{ matrix.imageName }}" == "7.4-zts-alpine" ]; then
          echo '{ "7.4": { "url": "x", "variants": [ "alpine3.15/zts" ], "version": "7.4.99" } }' > versions.json
          ; elif [ "${{ matrix.imageName }}" == "7.2-debian" ] || [ "${{ matrix.imageName }}" == "7.2-debug-debian" ]; then
          echo '{ "7.2": { "url": "x", "variants": [ "bullseye/cli" ], "version": "7.2.99" } }' > versions.json
          ; elif [ "${{ matrix.imageName }}" == "7.2-zts-debian" ]; then
          echo '{ "7.2": { "url": "x", "variants": [ "bullseye/zts" ], "version": "7.2.99" } }' > versions.json
          ; elif [ "${{ matrix.imageName }}" == "7.3-debian" ] || [ "${{ matrix.imageName }}" == "7.3-debug-debian" ]; then
          echo '{ "7.3": { "url": "x", "variants": [ "bullseye/cli" ], "version": "7.3.99" } }' > versions.json
          ; elif [ "${{ matrix.imageName }}" == "7.3-zts-debian" ]; then
          echo '{ "7.3": { "url": "x", "variants": [ "bullseye/zts" ], "version": "7.3.99" } }' > versions.json
          ; elif [ "${{ matrix.imageName }}" == "7.4-debian" ] || [ "${{ matrix.imageName }}" == "7.4-debug-debian" ]; then
          echo '{ "7.4": { "url": "x", "variants": [ "bullseye/cli" ], "version": "7.4.99" } }' > versions.json
          ; elif [ "${{ matrix.imageName }}" == "7.4-zts-debian" ]; then
          echo '{ "7.4": { "url": "x", "variants": [ "bullseye/zts" ], "version": "7.4.99" } }' > versions.json
          ; fi
          && git apply -v ../fix-dlphp-strip-pr1280.patch
          && ./apply-templates.sh
          && if [ "${{ matrix.imageName }}" == "7.2-alpine" ] || [ "${{ matrix.imageName }}" == "7.2-debug-alpine" ]; then
          mv 7.2/alpine3.15/cli/ img
          ; elif [ "${{ matrix.imageName }}" == "7.2-zts-alpine" ]; then
          mv 7.2/alpine3.15/zts/ img
          ; elif [ "${{ matrix.imageName }}" == "7.3-alpine" ] || [ "${{ matrix.imageName }}" == "7.3-debug-alpine" ]; then
          mv 7.3/alpine3.15/cli/ img
          ; elif [ "${{ matrix.imageName }}" == "7.3-zts-alpine" ]; then
          mv 7.3/alpine3.15/zts/ img
          ; elif [ "${{ matrix.imageName }}" == "7.4-alpine" ] || [ "${{ matrix.imageName }}" == "7.4-debug-alpine" ]; then
          mv 7.4/alpine3.15/cli/ img
          ; elif [ "${{ matrix.imageName }}" == "7.4-zts-alpine" ]; then
          mv 7.4/alpine3.15/zts/ img
          ; elif [ "${{ matrix.imageName }}" == "7.2-debian" ] || [ "${{ matrix.imageName }}" == "7.2-debug-debian" ]; then
          mv 7.2/bullseye/cli/ img
          ; elif [ "${{ matrix.imageName }}" == "7.2-zts-debian" ]; then
          mv 7.2/bullseye/zts/ img
          ; elif [ "${{ matrix.imageName }}" == "7.3-debian" ] || [ "${{ matrix.imageName }}" == "7.3-debug-debian" ]; then
          mv 7.3/bullseye/cli/ img
          ; elif [ "${{ matrix.imageName }}" == "7.3-zts-debian" ]; then
          mv 7.3/bullseye/zts/ img
          ; elif [ "${{ matrix.imageName }}" == "7.4-debian" ] || [ "${{ matrix.imageName }}" == "7.4-debug-debian" ]; then
          mv 7.4/bullseye/cli/ img
          ; elif [ "${{ matrix.imageName }}" == "7.4-zts-debian" ]; then
          mv 7.4/bullseye/zts/ img
          ; fi
          && cd img && mv ../../phpsrc/php.tar.xz .
          && sed -E 's~^(ENV PHP_VERSION[ =]).*~\1CUSTOM--'"$PHPSRC_BRANCH--$PHPSRC_COMMIT"'~' -i Dockerfile
          && sed -E 's~^(ENV PHP_URL[ =]).*~COPY php.tar.xz /usr/src/~' -i Dockerfile
          && sed -E 's~^(ENV (GPG_KEYS|PHP_URL|PHP_ASC_URL|PHP_SHA256)[ =]).*~~' -i Dockerfile
          && sed -E 's~-n "\$(PHP_SHA256|PHP_ASC_URL)"~-n ""~' -i Dockerfile
          && sed -E 's~curl -fsSL -o php.tar.xz .*; ~~' -i Dockerfile
          && if [ "${{ matrix.imageName }}" == "7.2-alpine" ] || [ "${{ matrix.imageName }}" == "7.2-zts-alpine" ] || [ "${{ matrix.imageName }}" == "7.2-debug-alpine" ] || [ "${{ matrix.imageName }}" == "7.3-alpine" ] || [ "${{ matrix.imageName }}" == "7.3-zts-alpine" ] || [ "${{ matrix.imageName }}" == "7.3-debug-alpine" ] || [ "${{ matrix.imageName }}" == "7.4-alpine" ] || [ "${{ matrix.imageName }}" == "7.4-zts-alpine" ] || [ "${{ matrix.imageName }}" == "7.4-debug-alpine" ]; then
          sed -E 's~(--with-curl.*)( \\)~\1 --enable-embed\2~' -i Dockerfile
          ; fi
          && if [ "${{ matrix.imageName }}" == "7.2-debug-alpine" ] || [ "${{ matrix.imageName }}" == "7.3-debug-alpine" ] || [ "${{ matrix.imageName }}" == "7.4-debug-alpine" ] || [ "${{ matrix.imageName }}" == "7.2-debug-debian" ] || [ "${{ matrix.imageName }}" == "7.3-debug-debian" ] || [ "${{ matrix.imageName }}" == "7.4-debug-debian" ]; then
          sed -E 's~(--with-curl.*)( \\)~\1 --enable-debug\2~' -i Dockerfile
          ; fi
          && git add . -N && git diff --diff-filter=d

      - name: 'Build base image - clone & patch - 7.xdev'
        if: (matrix.imageName == '7.2dev-alpine' || matrix.imageName == '7.2dev-zts-alpine' || matrix.imageName == '7.2dev-debug-alpine' || matrix.imageName == '7.3dev-alpine' || matrix.imageName == '7.3dev-zts-alpine' || matrix.imageName == '7.3dev-debug-alpine' || matrix.imageName == '7.4dev-alpine' || matrix.imageName == '7.4dev-zts-alpine' || matrix.imageName == '7.4dev-debug-alpine' || matrix.imageName == '7.2dev-debian' || matrix.imageName == '7.2dev-zts-debian' || matrix.imageName == '7.2dev-debug-debian' || matrix.imageName == '7.3dev-debian' || matrix.imageName == '7.3dev-zts-debian' || matrix.imageName == '7.3dev-debug-debian' || matrix.imageName == '7.4dev-debian' || matrix.imageName == '7.4dev-zts-debian' || matrix.imageName == '7.4dev-debug-debian')
        run: >-
          if [ "${{ matrix.imageName }}" == "7.2dev-alpine" ] || [ "${{ matrix.imageName }}" == "7.2dev-zts-alpine" ] || [ "${{ matrix.imageName }}" == "7.2dev-debug-alpine" ] || [ "${{ matrix.imageName }}" == "7.2dev-debian" ] || [ "${{ matrix.imageName }}" == "7.2dev-zts-debian" ] || [ "${{ matrix.imageName }}" == "7.2dev-debug-debian" ]; then
          export PHPSRC_BRANCH="$(git ls-remote 'https://github.com/php/php-src.git' | grep -iE '\srefs/heads/PHP-7\.2$' | sort -k2 -V | tee /dev/stderr | awk 'END{print $NF}' | sed -E 's~^refs/[^/]+/~~')"
          ; elif [ "${{ matrix.imageName }}" == "7.3dev-alpine" ] || [ "${{ matrix.imageName }}" == "7.3dev-zts-alpine" ] || [ "${{ matrix.imageName }}" == "7.3dev-debug-alpine" ] || [ "${{ matrix.imageName }}" == "7.3dev-debian" ] || [ "${{ matrix.imageName }}" == "7.3dev-zts-debian" ] || [ "${{ matrix.imageName }}" == "7.3dev-debug-debian" ]; then
          export PHPSRC_BRANCH="$(git ls-remote 'https://github.com/php/php-src.git' | grep -iE '\srefs/heads/PHP-7\.3$' | sort -k2 -V | tee /dev/stderr | awk 'END{print $NF}' | sed -E 's~^refs/[^/]+/~~')"
          ; elif [ "${{ matrix.imageName }}" == "7.4dev-alpine" ] || [ "${{ matrix.imageName }}" == "7.4dev-zts-alpine" ] || [ "${{ matrix.imageName }}" == "7.4dev-debug-alpine" ] || [ "${{ matrix.imageName }}" == "7.4dev-debian" ] || [ "${{ matrix.imageName }}" == "7.4dev-zts-debian" ] || [ "${{ matrix.imageName }}" == "7.4dev-debug-debian" ]; then
          export PHPSRC_BRANCH="$(git ls-remote 'https://github.com/php/php-src.git' | grep -iE '\srefs/heads/PHP-7\.4$' | sort -k2 -V | tee /dev/stderr | awk 'END{print $NF}' | sed -E 's~^refs/[^/]+/~~')"
          ; fi
          && if [ "${{ matrix.imageName }}" == "7.2dev-alpine" ] || [ "${{ matrix.imageName }}" == "7.2dev-zts-alpine" ] || [ "${{ matrix.imageName }}" == "7.2dev-debug-alpine" ] || [ "${{ matrix.imageName }}" == "7.3dev-alpine" ] || [ "${{ matrix.imageName }}" == "7.3dev-zts-alpine" ] || [ "${{ matrix.imageName }}" == "7.3dev-debug-alpine" ] || [ "${{ matrix.imageName }}" == "7.4dev-alpine" ] || [ "${{ matrix.imageName }}" == "7.4dev-zts-alpine" ] || [ "${{ matrix.imageName }}" == "7.4dev-debug-alpine" ] || [ "${{ matrix.imageName }}" == "7.2dev-debian" ] || [ "${{ matrix.imageName }}" == "7.2dev-zts-debian" ] || [ "${{ matrix.imageName }}" == "7.2dev-debug-debian" ] || [ "${{ matrix.imageName }}" == "7.3dev-debian" ] || [ "${{ matrix.imageName }}" == "7.3dev-zts-debian" ] || [ "${{ matrix.imageName }}" == "7.3dev-debug-debian" ] || [ "${{ matrix.imageName }}" == "7.4dev-debian" ] || [ "${{ matrix.imageName }}" == "7.4dev-zts-debian" ] || [ "${{ matrix.imageName }}" == "7.4dev-debug-debian" ]; then
          git clone --depth 1 'https://github.com/php/php-src.git' -b "$PHPSRC_BRANCH" phpsrc
          ; fi
          && cd phpsrc && export PHPSRC_COMMIT="$(git rev-parse HEAD)"
          && git checkout -B master
          && if [ "${{ matrix.imageName }}" == "7.2dev-alpine" ] || [ "${{ matrix.imageName }}" == "7.2dev-zts-alpine" ] || [ "${{ matrix.imageName }}" == "7.2dev-debug-alpine" ] || [ "${{ matrix.imageName }}" == "7.2dev-debian" ] || [ "${{ matrix.imageName }}" == "7.2dev-zts-debian" ] || [ "${{ matrix.imageName }}" == "7.2dev-debug-debian" ]; then
          sed -E 's~ --remote=\$PHPROOT ~ ~' -i makedist && git -c user.name="a" -c user.email="a@a" commit -am "Fix makedist for PHP 7.2"
          ; fi
          && if [ "${{ matrix.imageName }}" == "7.2dev-alpine" ] || [ "${{ matrix.imageName }}" == "7.2dev-zts-alpine" ] || [ "${{ matrix.imageName }}" == "7.2dev-debug-alpine" ]; then
          git apply -v ../fix-intl-php72-bug80310.patch && git -c user.name="a" -c user.email="a@a" commit -am "Fix intl ext build with ICU 68.1+ for PHP 7.2"
          ; fi
          && git apply -v ../fix-pdo_oci-bug60994.patch && git -c user.name="a" -c user.email="a@a" commit -am "Fix pdo_oci ext NCLOB read"
          && sudo apt-get -y update && sudo apt-get -y install bison re2c
